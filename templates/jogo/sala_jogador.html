{% extends 'base.html' %}
{% block title %}{{ sala.codigo }} – Jogo Moriá{% endblock %}

{% block extra_js %}
<script>
const CODIGO = "{{ sala.codigo }}";
const NOME = "{{ nome_jogador|escapejs }}";

const WS_URL =
(location.protocol === 'https:' ? 'wss://' : 'ws://') +
location.host +
'/ws/jogo/' + CODIGO + '/';

let ws = null;
let reconectando = false;
let tentativas = 0;
let maxTentativas = 20;

let timerInterval = null;
let timeLeft = 20;
let respostaSelecionada = null;
let perguntaId = null;
let inicioResposta = 0;

/* =========================
   SOM
========================= */

const somClick = new Audio('/static/sounds/click.mp3');
const somAcerto = new Audio('/static/sounds/acerto.mp3');
const somErro = new Audio('/static/sounds/erro.mp3');
const somFim = new Audio('/static/sounds/fim.mp3');

function tocar(audio){
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

/* =========================
   UI
========================= */

function mostrarTela(id){
  document.querySelectorAll('.tela').forEach(t=>{
    t.classList.remove('ativa');
  });

  const el = document.getElementById(id);
  if(el) el.classList.add('ativa');
}

function statusConexao(txt){
  const el = document.getElementById('status-conexao');
  if(el) el.textContent = txt;
}

/* =========================
   WEBSOCKET
========================= */

function conectar(){

  if(ws && ws.readyState === WebSocket.OPEN){
    return;
  }

  statusConexao("Conectando...");
  mostrarTela('tela-conectando');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {

    tentativas = 0;
    reconectando = false;

    statusConexao("Conectado");

    setTimeout(()=>{
      ws.send(JSON.stringify({
        tipo:'entrar',
        nome:NOME
      }));
    }, 400);
  };

  ws.onmessage = (e)=>{
    const msg = JSON.parse(e.data);

    switch(msg.tipo){

      case 'entrou':
        mostrarTela('tela-espera');
        break;

      case 'jogadores_atualizados':
        atualizarJogadores(msg.jogadores);
        break;

      case 'nova_pergunta':
        mostrarPergunta(msg);
        break;

      case 'resposta_confirmada':
        marcarResposta(msg);
        break;

      case 'revelacao':
        mostrarRevelacao(msg);
        break;

      case 'fim_de_jogo':
        mostrarFim(msg.placar);
        break;
    }
  };

  ws.onerror = ()=>{
    ws.close();
  };

  ws.onclose = ()=>{

    statusConexao("Reconectando...");

    if(reconectando) return;

    reconectando = true;

    if(tentativas >= maxTentativas){
      statusConexao("Falha de conexão");
      return;
    }

    tentativas++;

    setTimeout(()=>{
      reconectando = false;
      conectar();
    }, 2500);
  };
}

/* =========================
   JOGADORES
========================= */

function atualizarJogadores(lista){

  const el = document.getElementById('espera-jogadores');

  el.innerHTML =
    '<p>'+lista.length+' jogador(es)</p>' +
    lista.map(j => `<div>${j.nome}</div>`).join('');
}

/* =========================
   PERGUNTA
========================= */

function mostrarPergunta(msg){

  respostaSelecionada = null;
  perguntaId = msg.pergunta.id;
  inicioResposta = Date.now();

  document.getElementById('pq-texto').textContent =
    msg.pergunta.texto;

  document.getElementById('pq-opcoes').innerHTML = '';

  msg.pergunta.opcoes.forEach(o=>{

    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<strong>${o.letra}</strong> ${o.texto}`;

    btn.onclick = ()=>{
      responder(o.letra, btn);
    };

    document.getElementById('pq-opcoes').appendChild(btn);
  });

  iniciarTimer();

  mostrarTela('tela-pergunta');
}

/* =========================
   TIMER
========================= */

function iniciarTimer(){

  clearInterval(timerInterval);

  timeLeft = 20;

  document.getElementById('pq-timer').textContent = '20s';

  timerInterval = setInterval(()=>{

    timeLeft--;

    document.getElementById('pq-timer').textContent =
      timeLeft + 's';

    if(timeLeft <= 0){

      clearInterval(timerInterval);

      document.querySelectorAll('.choice-btn')
      .forEach(b=>b.disabled=true);
    }

  },1000);
}

/* =========================
   RESPONDER
========================= */

function responder(opcao, btn){

  if(respostaSelecionada) return;

  tocar(somClick);

  respostaSelecionada = opcao;

  clearInterval(timerInterval);

  const tempo =
    (Date.now() - inicioResposta) / 1000;

  document.querySelectorAll('.choice-btn')
  .forEach(b=>b.disabled=true);

  btn.classList.add('selecionado');

  ws.send(JSON.stringify({
    tipo:'responder',
    opcao:opcao,
    pergunta_id:perguntaId,
    tempo:tempo
  }));
}

function marcarResposta(msg){

  const btn =
    document.querySelector('.choice-btn.selecionado');

  if(!btn) return;

  if(msg.correta){
    btn.classList.add('certa');
    tocar(somAcerto);
  }else{
    btn.classList.add('errada');
    tocar(somErro);
  }
}

/* =========================
   REVELAÇÃO
========================= */

function mostrarRevelacao(msg){

  clearInterval(timerInterval);

  document.getElementById('rv-texto').textContent =
    msg.pergunta.texto;

  mostrarTela('tela-revelacao');
}

/* =========================
   FIM
========================= */

function mostrarFim(placar){

  tocar(somFim);

  const el = document.getElementById('fim-placar');

  el.innerHTML = placar.map((j,i)=>`
    <div>
      ${i+1}º ${j.nome} - ${j.pontos} pts
    </div>
  `).join('');

  mostrarTela('tela-fim');
}

/* =========================
   START COM DELAY
========================= */

setTimeout(()=>{
  conectar();
}, 1200);

</script>
{% endblock %}
